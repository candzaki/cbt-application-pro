<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem CBT Modern - Masuk</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#6366F1">
    <link rel="apple-touch-icon" href="/static/icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        // Set theme immediately to prevent flickering
        const savedTheme = localStorage.getItem('cbt_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('cbt_theme', next);
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" title="Ganti Tema">🌓</button>
    <div class="auth-wrapper">
        <div class="login-box">
        <div class="icon-header">🔬</div>
        <h1>Portal CBT Utama</h1>
        <p class="desc">Aplikasi Ujian Aman Terstandarisasi</p>
        
        <form onsubmit="executeLoginV3(event)">
            <div class="input-group">
                <label for="nim">Nomor Induk Mahasiswa (NIM)</label>
                <input type="text" id="nim" class="form-input" placeholder="Contoh: 230145..." required autocomplete="off">
            </div>
            <div class="input-group">
                <label for="password">Kata Sandi</label>
                <input type="password" id="password" class="form-input" placeholder="Masukkan kata sandi" required>
            </div>
            <div class="input-group">
                <label for="token">Token Ujian / Sandi</label>
                <input type="password" id="token" class="form-input" placeholder="Masukkan token akses" required>
            </div>
            <button type="submit" class="btn-submit">Otorisasi & Masuk</button>
        </form>
        <div class="demo-badge">Sistem Pengawasan Otomatis Aktif</div>
        <a href="/register" class="link-back">Belum punya akun? Daftar di sini</a>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const savedNim = localStorage.getItem('cbt_saved_nim');
            const savedPassword = localStorage.getItem('cbt_saved_password');
            if (savedNim) document.getElementById('nim').value = savedNim;
            if (savedPassword) document.getElementById('password').value = savedPassword;
            document.getElementById('token').value = 'KIMIA2026'; // Pre-fill token
        });

        async function executeLoginV3(e) {
            e.preventDefault();
            const nim = document.getElementById('nim').value.trim();
            const password = document.getElementById('password').value.trim();
            const token = document.getElementById('token').value.trim();
            
            if(nim && password && token) {
                try {
                    const response = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ nim, password, token })
                    });
                    
                    const data = await response.json();
                    if(response.ok) {
                        sessionStorage.setItem('cbt_user_nim_v3', nim);
                        sessionStorage.setItem('cbt_user_nama_v3', data.nama);
                        window.location.href = '/exam';
                    } else {
                        alert(data.error || 'Login gagal');
                    }
                } catch (err) {
                    console.error(err);
                    alert('Terjadi kesalahan jaringan');
                }
            }
        }
    </script>
    <script src="{{ url_for('static', filename='js/background.js') }}"></script>
</body>
</html>
