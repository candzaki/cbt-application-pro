services:
  - type: web
    name: cbt-exam-pro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0
    envVars:
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /_stcore/health
    autoDeploy: true
